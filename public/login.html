<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fulcrum — Access Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Exo 2', sans-serif;
      background: #1a1a1e;
      background-image:
        radial-gradient(ellipse at 30% 20%, rgba(60,55,50,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(50,45,40,0.3) 0%, transparent 60%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.008) 2px,
          rgba(255,255,255,0.008) 4px
        );
      overflow: hidden;
    }

    .forge-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    .forge-logo {
      width: 160px;
      height: 160px;
      margin: 0 auto 1.5rem;
      animation: logo-breathe 4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(199,146,52,0.3));
    }

    @keyframes logo-breathe {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(199,146,52,0.3)); }
      50% { filter: drop-shadow(0 0 35px rgba(199,146,52,0.5)) drop-shadow(0 0 60px rgba(180,80,40,0.15)); }
    }

    .forge-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c8a44e;
      text-shadow: 0 0 30px rgba(199,146,52,0.2);
      margin-bottom: 0.3rem;
    }

    .forge-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #7a7068;
      margin-bottom: 2.5rem;
    }

    .forge-panel {
      background: linear-gradient(165deg, #2a2a2e 0%, #1e1e22 40%, #252528 100%);
      border: 1px solid #3a3632;
      padding: 2rem 1.75rem;
      position: relative;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(0,0,0,0.3),
        0 8px 32px rgba(0,0,0,0.5);
    }

    .forge-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(199,146,52,0.4), transparent);
    }

    .forge-panel::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(199,146,52,0.2), transparent);
    }

    .forge-input-wrapper {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .forge-input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: 'Exo 2', sans-serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-align: center;
      background: #151517;
      border: 1px solid #3a3632;
      color: #d4c5a0;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .forge-input:focus {
      border-color: #c8a44e;
      box-shadow: 0 0 12px rgba(199,146,52,0.15), inset 0 0 8px rgba(199,146,52,0.05);
    }

    .forge-input::placeholder {
      color: #5a534a;
      letter-spacing: 0.15em;
      font-weight: 300;
    }

    .forge-error {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: #cc4444;
      min-height: 1.4em;
      margin-bottom: 1rem;
    }

    .forge-btn {
      width: 100%;
      padding: 0.7rem 0;
      font-family: 'Audiowide', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #3a3632 0%, #2a2622 100%);
      border: 1px solid #4a4238;
      color: #c8a44e;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .forge-btn:hover {
      border-color: #c8a44e;
      color: #ffe0a0;
      box-shadow: 0 0 16px rgba(199,146,52,0.2);
      text-shadow: 0 0 8px rgba(199,146,52,0.4);
    }

    .forge-btn:active {
      transform: scale(0.98);
      background: linear-gradient(180deg, #2a2622 0%, #3a3632 100%);
    }

    .forge-rivets {
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      pointer-events: none;
    }
    .forge-rivets::before,
    .forge-rivets::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, #4a4238, #2a2622);
      box-shadow: 0 0.5px 1px rgba(255,255,255,0.06);
    }
    .forge-rivets::before { top: 0; left: 0; }
    .forge-rivets::after { top: 0; right: 0; }

    .forge-rivets-bottom {
      position: absolute;
      bottom: 8px; left: 8px; right: 8px;
      pointer-events: none;
    }
    .forge-rivets-bottom::before,
    .forge-rivets-bottom::after {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, #4a4238, #2a2622);
      box-shadow: 0 0.5px 1px rgba(255,255,255,0.06);
    }
    .forge-rivets-bottom::before { bottom: 0; left: 0; }
    .forge-rivets-bottom::after { bottom: 0; right: 0; }

    .forge-footer {
      margin-top: 2rem;
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #4a4238;
    }

    .forge-scan-line {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 6px
      );
      z-index: 100;
    }

    .forge-sparks {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .forge-spark {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(199,146,52,0.6);
      animation: spark-drift 8s linear infinite;
    }
    .forge-spark:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; animation-duration: 12s; }
    .forge-spark:nth-child(2) { left: 80%; top: 40%; animation-delay: 2s; animation-duration: 10s; }
    .forge-spark:nth-child(3) { left: 45%; top: 70%; animation-delay: 4s; animation-duration: 14s; }
    .forge-spark:nth-child(4) { left: 25%; top: 85%; animation-delay: 1s; animation-duration: 11s; }
    .forge-spark:nth-child(5) { left: 70%; top: 15%; animation-delay: 3s; animation-duration: 9s; }
    .forge-spark:nth-child(6) { left: 55%; top: 55%; animation-delay: 5s; animation-duration: 13s; }
    .forge-spark:nth-child(7) { left: 10%; top: 50%; animation-delay: 6s; animation-duration: 15s; }
    .forge-spark:nth-child(8) { left: 90%; top: 75%; animation-delay: 7s; animation-duration: 10s; }

    @keyframes spark-drift {
      0% { opacity: 0; transform: translateY(0) scale(1); }
      10% { opacity: 0.8; }
      50% { opacity: 0.3; transform: translateY(-40px) scale(0.5); }
      100% { opacity: 0; transform: translateY(-80px) scale(0); }
    }

    .crawl-launch-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 40;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a2e;
      border: 1px solid #3a3632;
      color: #c8a44e;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      border-radius: 4px;
      padding: 0;
    }
    .crawl-launch-btn:hover {
      background: #c8a44e;
      color: #1a1a1e;
      border-color: #c8a44e;
    }
    .crawl-launch-btn svg {
      width: 1.2rem;
      height: 1.2rem;
    }
  </style>
</head>
<body>
  <div class="forge-scan-line"></div>

  <div class="forge-sparks">
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
  </div>

  <div class="forge-container">
    <img src="/images/fulcrum-logo.png" alt="Fulcrum" class="forge-logo" />

    <h1 class="forge-title">Fulcrum</h1>
    <p class="forge-subtitle">Campaign Management System</p>

    <div class="forge-panel">
      <div class="forge-rivets"></div>
      <div class="forge-rivets-bottom"></div>

      <form id="login-form" autocomplete="off">
        <div class="forge-input-wrapper">
          <input
            id="passcode"
            type="password"
            class="forge-input"
            placeholder="Enter Access Code"
            autocomplete="off"
            autofocus
          />
        </div>
        <p id="login-error" class="forge-error">&nbsp;</p>
        <button type="submit" class="forge-btn">Authenticate</button>
      </form>
    </div>

    <footer class="forge-footer">
      Edge of the Empire
    </footer>
  </div>

  <script>
    (function () {
      var form  = document.getElementById('login-form');
      var input = document.getElementById('passcode');
      var error = document.getElementById('login-error');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        error.innerHTML = '&nbsp;';
        var code = input.value.trim();
        if (!code) { error.textContent = 'Enter an access code.'; return; }

        fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ passcode: code }),
        })
          .then(function (res) { return res.json().then(function (d) { return { ok: res.ok, data: d }; }); })
          .then(function (result) {
            if (!result.ok) {
              error.textContent = result.data.error || 'Access denied.';
              input.value = '';
              input.focus();
              return;
            }
            window.location.href = '/';
          })
          .catch(function () {
            error.textContent = 'Connection failed.';
          });
      });
    }());
  </script>

  <script src="/js/crawl-data.js"></script>
  <script src="/js/opening-crawl.js"></script>
  <script src="/js/landing.js"></script>
</body>
</html>
