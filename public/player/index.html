<!DOCTYPE html>
<html lang="en" class="theme-rebellion">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Sheet — The Edge of the Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/output.css" />
  <link rel="stylesheet" href="/css/tactical-map.css" />
  <style>
    .jb-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: jbFadeIn 0.3s ease;
    }
    @keyframes jbFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .jb-modal {
      background: var(--color-bg-panel, #1a1a2e);
      border: 2px solid var(--color-danger, #ef4444);
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 40px rgba(239,68,68,0.3), 0 0 80px rgba(0,0,0,0.6);
      animation: jbSlideUp 0.35s ease;
    }
    @keyframes jbSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .jb-modal-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      background: rgba(239,68,68,0.1);
      border-bottom: 1px solid var(--color-danger, #ef4444);
    }
    .jb-modal-icon {
      font-size: 1.2rem;
    }
    .jb-modal-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.85rem;
      color: var(--color-danger, #ef4444);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .jb-modal-encounter {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.65rem;
      color: var(--color-accent-primary, #c79234);
      margin-left: auto;
    }
    .jb-modal-body {
      padding: 0.75rem;
    }
    .jb-step-down {
      background: color-mix(in srgb, var(--color-warn) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-warn) 30%, transparent);
      padding: 0.4rem 0.6rem;
      margin-bottom: 0.6rem;
      font-size: 0.7rem;
      color: var(--color-warn);
      font-weight: 600;
    }
    .jb-rules {
      margin-bottom: 0.6rem;
      font-size: 0.68rem;
      line-height: 1.6;
    }
    .jb-rule {
      color: var(--color-text-secondary);
      margin-bottom: 0.15rem;
    }
    .jb-rule-fail {
      color: var(--color-warn);
    }
    .jb-rule-master {
      color: var(--color-success);
    }
    .jb-inputs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }
    .jb-input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .jb-input-group label {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      color: var(--color-accent-primary, #c79234);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .jb-input-group input {
      background: var(--color-bg-primary, #0d0d1a);
      border: 1px solid var(--color-border, #2a2a3e);
      color: var(--color-text-primary, #e5e5e5);
      font-family: 'Audiowide', sans-serif;
      font-size: 0.85rem;
      padding: 0.4rem;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
      min-height: 38px;
    }
    .jb-input-group input:focus {
      border-color: var(--color-accent-primary, #c79234);
    }
    .jb-submit-btn {
      width: 100%;
      background: transparent;
      border: 2px solid var(--color-danger, #ef4444);
      color: var(--color-danger, #ef4444);
      font-family: 'Audiowide', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 40px;
    }
    .jb-submit-btn:hover {
      background: var(--color-danger, #ef4444);
      color: var(--color-btn-text, #000);
    }
    .jb-result {
      text-align: center;
      padding: 0.6rem;
      font-family: 'Audiowide', sans-serif;
      font-size: 0.8rem;
    }
    .jb-waiting {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.7rem;
      color: var(--color-text-secondary, #9ca3af);
      font-style: italic;
    }

    .tut-container {
      position: fixed;
      bottom: 8vh;
      left: 2vw;
      z-index: 8000;
      width: 340px;
      min-width: 260px;
      min-height: 80px;
      max-height: 70vh;
      background: var(--color-bg-panel);
      border: 1px solid var(--color-accent-primary, #c79234);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 12px rgba(199,146,52,0.15);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.7rem;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      resize: none;
    }
    .tut-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.5rem;
      background: color-mix(in srgb, var(--color-accent-primary) 12%, transparent);
      border-bottom: 1px solid var(--color-accent-primary, #c79234);
      cursor: grab;
      user-select: none;
    }
    .tut-header:active { cursor: grabbing; }
    .tut-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      color: var(--color-accent-primary, #c79234);
      letter-spacing: 0.08em;
      flex: 1;
    }
    .tut-phase-badge {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.5rem;
      color: var(--color-text-secondary);
      background: color-mix(in srgb, var(--color-accent-primary) 15%, transparent);
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
    }
    .tut-collapse-btn {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 0.2rem;
      line-height: 1;
    }
    .tut-body {
      overflow-y: auto;
      flex: 1;
      padding: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--color-accent-primary) transparent;
    }
    .tut-section-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.55rem;
      color: var(--color-accent-primary, #c79234);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 0.6rem 0 0.25rem 0;
      padding-bottom: 0.15rem;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 40%, transparent);
    }
    .tut-section-title:first-child { margin-top: 0; }
    .tut-assess-desc {
      font-size: 0.65rem;
      line-height: 1.5;
      color: var(--color-text-secondary);
      margin-bottom: 0.4rem;
      white-space: pre-line;
    }
    .tut-disc-group {
      margin-bottom: 0.4rem;
    }
    .tut-disc-name {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.55rem;
      color: var(--color-text-primary);
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
      padding: 0.15rem 0.3rem;
      background: color-mix(in srgb, var(--color-border) 20%, transparent);
      border-left: 2px solid var(--color-accent-primary, #c79234);
    }
    .tut-question {
      font-size: 0.65rem;
      color: var(--color-text-secondary);
      padding: 0.15rem 0 0.15rem 0.6rem;
      line-height: 1.4;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 15%, transparent);
    }
    .tut-question:last-child { border-bottom: none; }
    .tut-gambit-card {
      margin-top: 0.3rem;
      padding: 0.35rem 0.5rem;
      background: color-mix(in srgb, var(--color-success, #22c55e) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-success, #22c55e) 25%, transparent);
      border-left: 3px solid var(--color-success, #22c55e);
    }
    .tut-gambit-name {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.55rem;
      color: var(--color-success, #22c55e);
      letter-spacing: 0.04em;
      margin-bottom: 0.1rem;
    }
    .tut-gambit-kit {
      font-size: 0.5rem;
      color: var(--color-text-secondary);
      font-style: italic;
      margin-bottom: 0.15rem;
    }
    .tut-gambit-rule {
      font-size: 0.6rem;
      color: var(--color-text-secondary);
      line-height: 1.4;
    }
    .tut-no-gambits {
      font-size: 0.6rem;
      color: var(--color-text-secondary);
      font-style: italic;
      padding: 0.2rem 0;
    }
    .tut-phase-label {
      font-size: 0.65rem;
      color: var(--color-accent-primary, #c79234);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .pit-container {
      position: fixed;
      bottom: 8vh;
      right: 26vw;
      z-index: 8000;
      width: 220px;
      min-width: 180px;
      min-height: 80px;
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.7rem;
      max-height: 50vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      resize: none;
    }
    .pit-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.5rem;
      background: color-mix(in srgb, var(--color-accent-secondary) 12%, transparent);
      border-bottom: 1px solid var(--color-border);
      cursor: grab;
      user-select: none;
    }
    .pit-header:active { cursor: grabbing; }
    .pit-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      color: var(--color-accent-secondary);
      letter-spacing: 0.08em;
      flex: 1;
    }
    .pit-round {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      color: var(--color-accent-primary);
    }
    .pit-collapse-btn {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 0.2rem;
      line-height: 1;
    }
    .pit-body {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--color-accent-primary) transparent;
    }
    .pit-turn-list { display: flex; flex-direction: column; }
    .pit-entry {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.5rem;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border) 30%, transparent);
      transition: background 0.15s;
    }
    .pit-my-turn-banner {
      text-align: center;
      padding: 0.25rem 0.4rem;
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--color-btn-text, #000);
      background: var(--color-success, #22c55e);
      animation: pit-pulse 1.5s ease-in-out infinite;
    }
    @keyframes pit-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .pit-entry.pit-current {
      background: color-mix(in srgb, var(--color-accent-secondary) 12%, transparent);
      border-left: 3px solid var(--color-accent-secondary);
    }
    .pit-entry.pit-me {
      background: color-mix(in srgb, var(--color-success) 8%, transparent);
    }
    .pit-entry.pit-me.pit-current {
      background: color-mix(in srgb, var(--color-success) 20%, transparent);
      border-left: 3px solid var(--color-success);
    }
    .pit-entry.pit-pc { color: var(--color-success, #22c55e); }
    .pit-entry.pit-npc { color: var(--color-text-secondary); }
    .pit-entry.pit-down { opacity: 0.35; text-decoration: line-through; }
    .pit-init {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      width: 1.4rem;
      text-align: center;
      color: var(--color-accent-primary);
    }
    .pit-disp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1rem;
      height: 0.85rem;
      border-radius: 2px;
      font-family: 'Audiowide', sans-serif;
      font-size: 0.45rem;
      font-weight: 700;
      color: #000;
      flex-shrink: 0;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }
    .pit-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pit-hp {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.55rem;
      flex-shrink: 0;
    }
    .pit-conds {
      display: flex;
      gap: 0.15rem;
      flex-wrap: wrap;
    }
    .pit-cond {
      font-size: 0.5rem;
      padding: 0 0.2rem;
      border-radius: 2px;
      background: color-mix(in srgb, var(--color-accent-secondary) 15%, transparent);
      color: var(--color-accent-secondary);
      border: 1px solid color-mix(in srgb, var(--color-accent-secondary) 30%, transparent);
      text-transform: capitalize;
    }
    .pit-resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 14px;
      height: 14px;
      cursor: nwse-resize;
      z-index: 10;
    }
    .pit-resize-handle::after {
      content: '';
      position: absolute;
      bottom: 3px;
      right: 3px;
      width: 8px;
      height: 8px;
      border-right: 2px solid var(--color-text-secondary);
      border-bottom: 2px solid var(--color-text-secondary);
      opacity: 0.5;
    }

    .decision-vote-overlay {
      position: fixed;
      inset: 0;
      z-index: 9500;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: jbFadeIn 0.3s ease;
    }
    .decision-vote-modal {
      background: var(--color-bg-panel, #1a1a2e);
      border: 2px solid var(--color-accent-primary, #c79234);
      max-width: 440px;
      width: 90%;
      box-shadow: 0 0 40px rgba(200,164,78,0.2), 0 0 80px rgba(0,0,0,0.6);
      animation: jbSlideUp 0.35s ease;
    }
    .decision-vote-header {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.85rem;
      color: var(--color-accent-primary, #c79234);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.6rem 0.75rem;
      background: rgba(200,164,78,0.08);
      border-bottom: 1px solid rgba(200,164,78,0.3);
      text-align: center;
    }
    .decision-vote-key {
      font-size: 0.72rem;
      color: var(--color-text-secondary, #999);
      text-align: center;
      padding: 0.4rem 0.75rem 0;
    }
    .decision-vote-choices {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .decision-vote-btn {
      background: rgba(200,164,78,0.06);
      border: 1px solid rgba(200,164,78,0.25);
      color: var(--color-text-primary, #e0dcd4);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.78rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      min-height: 44px;
    }
    .decision-vote-btn:hover:not(:disabled) {
      border-color: var(--color-accent-primary, #c79234);
      background: rgba(200,164,78,0.12);
    }
    .decision-vote-btn.selected {
      border-color: var(--color-accent-primary, #c79234);
      background: rgba(200,164,78,0.18);
      color: var(--color-accent-primary, #c79234);
      font-weight: 600;
    }
    .decision-vote-btn:disabled:not(.selected) {
      opacity: 0.4;
      cursor: default;
    }
    .decision-vote-status {
      font-size: 0.68rem;
      color: var(--color-text-secondary, #999);
      text-align: center;
      padding: 0.4rem 0.75rem 0.6rem;
      font-style: italic;
    }

    .nc-player-overlay {
      position: fixed;
      inset: 0;
      z-index: 9500;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: jbFadeIn 0.3s ease;
    }
    .nc-player-modal {
      background: var(--color-bg-panel, #1a1a2e);
      border: 2px solid var(--color-accent-primary, #c79234);
      max-width: 520px;
      width: 92%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 0 60px rgba(200,164,78,0.15), 0 0 120px rgba(0,0,0,0.7);
      animation: jbSlideUp 0.35s ease;
      scrollbar-width: thin;
      scrollbar-color: var(--color-accent-primary) transparent;
    }
    .nc-player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.75rem;
      background: rgba(200,164,78,0.08);
      border-bottom: 1px solid rgba(200,164,78,0.3);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(8px);
    }
    .nc-player-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.8rem;
      color: var(--color-accent-primary, #c79234);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .nc-player-round {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.6rem;
      color: var(--color-text-secondary, #9ca3af);
      letter-spacing: 0.06em;
    }
    .nc-player-setup {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(200,164,78,0.15);
    }
    .nc-player-desc {
      font-size: 0.72rem;
      color: var(--color-accent-primary, #c79234);
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }
    .nc-player-setup-text {
      font-size: 0.72rem;
      color: var(--color-text-secondary, #9ca3af);
      line-height: 1.7;
      white-space: pre-line;
    }
    .nc-player-prompt {
      padding: 0.75rem;
      font-size: 0.75rem;
      color: var(--color-text-primary, #e5e5e5);
      line-height: 1.7;
    }
    .nc-player-context {
      padding: 0 0.75rem 0.5rem;
      font-size: 0.68rem;
      color: var(--color-text-secondary, #9ca3af);
      font-style: italic;
      line-height: 1.5;
      border-left: 2px solid rgba(200,164,78,0.3);
      margin: 0 0.75rem 0.5rem;
      padding-left: 0.5rem;
    }
    .nc-player-choices {
      padding: 0 0.75rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .nc-player-choice-btn {
      background: rgba(200,164,78,0.04);
      border: 1px solid rgba(200,164,78,0.2);
      color: var(--color-text-primary, #e0dcd4);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.75rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 48px;
    }
    .nc-player-choice-btn:hover:not(:disabled) {
      border-color: var(--color-accent-primary, #c79234);
      background: rgba(200,164,78,0.1);
      transform: translateX(4px);
    }
    .nc-player-choice-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }
    .nc-player-choice--selected {
      border-color: var(--color-accent-primary, #c79234) !important;
      background: rgba(200,164,78,0.15) !important;
      opacity: 1 !important;
    }
    .nc-player-choice-label {
      flex: 1;
    }
    .nc-player-choice-disc {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.5rem;
      color: var(--color-text-secondary, #9ca3af);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      opacity: 0.7;
    }
    .nc-player-narration {
      padding: 0.75rem;
      font-size: 0.72rem;
      color: var(--color-text-secondary, #9ca3af);
      line-height: 1.7;
      font-style: italic;
      border-top: 1px solid rgba(200,164,78,0.15);
      animation: jbFadeIn 0.5s ease;
    }
    .nc-player-continue-btn {
      display: block;
      width: calc(100% - 1.5rem);
      margin: 0 0.75rem 0.75rem;
      background: transparent;
      border: 2px solid var(--color-accent-primary, #c79234);
      color: var(--color-accent-primary, #c79234);
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 42px;
    }
    .nc-player-continue-btn:hover {
      background: var(--color-accent-primary, #c79234);
      color: var(--color-btn-text, #000);
    }
    .nc-player-waiting {
      padding: 2rem 1rem;
      text-align: center;
    }
    .nc-player-waiting-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      opacity: 0.5;
      animation: pit-pulse 2s ease-in-out infinite;
    }
    .nc-player-waiting-text {
