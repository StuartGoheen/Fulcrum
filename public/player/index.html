<!DOCTYPE html>
<html lang="en" class="theme-rebellion">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Sheet — The Edge of the Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="font-body" style="background-color:var(--color-bg-primary);color:var(--color-text-primary);overflow:hidden;height:100vh;">

  <div class="flex flex-col h-screen">

    <nav id="navbar"
      class="fixed top-0 z-30 flex items-center"
      style="
        left: 25vw;
        right: 25vw;
        height: 6vh;
        min-height: 40px;
        background: var(--color-bg-frame);
        border-bottom: 1px solid var(--color-border);
      ">

      <div class="panel-nav-row">
        <div class="panel-nav-group">
          <button id="slot-left-prev" class="panel-nav-btn" aria-label="Previous panel left slot">&#x276E;</button>
          <span id="slot-left-label" class="panel-nav-label">Panel 1</span>
          <button id="slot-left-next" class="panel-nav-btn" aria-label="Next panel left slot">&#x276F;</button>
        </div>

        <span class="panel-nav-divider"></span>

        <div class="panel-nav-group">
          <button id="slot-right-prev" class="panel-nav-btn" aria-label="Previous panel right slot">&#x276E;</button>
          <span id="slot-right-label" class="panel-nav-label">Panel 2</span>
          <button id="slot-right-next" class="panel-nav-btn" aria-label="Next panel right slot">&#x276F;</button>
        </div>
      </div>

    </nav>

    <div class="flex flex-1" style="padding-top:6vh;">

      <!-- ── Left frame ─────────────────────────────────────────── -->
      <aside id="frame-left"
        class="fixed top-0 bottom-0 left-0 z-20 flex flex-col"
        style="
          width: 25vw;
          min-width: 200px;
          background: var(--color-bg-frame);
          border-right: 1px solid var(--color-border);
          overflow: hidden;
        ">

        <!-- Tab bar: hidden on desktop, shown on tablet via CSS -->
        <div class="frame-left-tabs" role="tablist" aria-label="Character panels">
          <button class="frame-left-tab is-active" data-tab="character" role="tab" aria-selected="true">
            <svg class="frame-tab-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 13.5c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Character
          </button>
          <button class="frame-left-tab" data-tab="status" role="tab" aria-selected="false">
            <svg class="frame-tab-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <polyline points="1,8 3.5,8 5,3 7,13 8.5,6 10,9 11.5,8 15,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Status
          </button>
        </div>

        <!-- Character panel tab -->
        <div id="tab-character" class="frame-tab-panel is-active" style="padding:7px 0 0 7px;">
          <div id="char-panel-container" style="flex:1;min-height:0;overflow:hidden;position:relative;"></div>
        </div>

        <!-- Status tab — char-status-container is moved here by JS on tablet -->
        <div id="tab-status" class="frame-tab-panel"></div>

      </aside>

      <!-- ── Resize handle: left ── (outside flow, positioned by JS) -->
      <div id="resize-handle-left" class="resize-handle"></div>

      <!-- ── Center ─────────────────────────────────────────────── -->
      <main id="center-content"
        class="flex flex-1 gap-0"
        style="
          margin-left: 25vw;
          margin-right: 25vw;
          overflow: hidden;
          height: calc(100vh - 6vh);
        ">

        <section id="slot-left"
          class="flex-1 overflow-y-auto"
          style="border-right:1px solid var(--color-border);padding-bottom:10vh;min-height:0;">
          <div id="slot-left-content" class="min-h-full">
          </div>
        </section>

        <section id="slot-right"
          class="flex-1 overflow-y-auto"
          style="padding-bottom:10vh;min-height:0;">
          <div id="slot-right-content" class="min-h-full">
          </div>
        </section>

      </main>

      <!-- ── Resize handle: right ── (outside flow, positioned by JS) -->
      <div id="resize-handle-right" class="resize-handle"></div>

      <!-- ── Right frame ────────────────────────────────────────── -->
      <aside id="frame-right"
        class="fixed top-0 bottom-0 right-0 z-20 flex flex-col"
        style="
          width: 25vw;
          min-width: 200px;
          padding-top: 7px;
          background: var(--color-bg-frame);
          border-left: 1px solid var(--color-border);
          overflow-y: auto;
        ">
        <div id="char-status-container" style="height:100%;overflow-y:auto;position:relative;">
          <div id="char-vitality-wrap"></div>
          <div id="char-effects-wrap"></div>
          <div id="char-engine-wrap"></div>
          <div id="char-ladder-wrap"></div>
          <div id="char-effects-notify" class="char-notify-overlay"></div>
        </div>
      </aside>

    </div>

    <!-- ── Footer / Destiny bar ───────────────────────────────── -->
    <footer id="player-footer"
      class="fixed bottom-0 z-30"
      style="
        left: 25vw;
        right: 25vw;
        background: var(--color-bg-frame);
        border-top: 1px solid var(--color-border);
      ">
      <div class="destiny-footer-grid">
        <div class="destiny-footer-left">
          <div class="destiny-footer-row1">
            <span class="destiny-label-text">DESTINY</span>
            <button class="destiny-info-btn" id="destiny-info-btn" title="Destiny Pool Rules" aria-label="Destiny Pool Rules">ⓘ</button>
            <span class="destiny-separator">:</span>
            <span class="destiny-personal-name" id="destiny-personal-name"></span>
          </div>
          <div class="destiny-footer-row2" id="destiny-personal-mechs"></div>
        </div>
        <div class="destiny-footer-right">
          <div class="force-tracker" id="force-tracker"></div>
          <div class="destiny-state" id="destiny-state"></div>
        </div>
      </div>
    </footer>

  </div>

  <div id="panel-1" class="panel-content hidden"></div>

  <div id="panel-2" class="panel-content hidden">
    <!-- populated dynamically by armory-panel.js -->
  </div>

  <div id="panel-3" class="panel-content hidden">
    <!-- populated dynamically by maneuvers-panel.js -->
  </div>

  <div id="panel-4" class="panel-content hidden">
    <!-- populated dynamically by armor-panel.js -->
  </div>

  <div id="panel-5" class="panel-content hidden"></div>

  <div id="glossary-overlay-mount"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/panels.js"></script>
  <script src="/js/character-panel.js"></script>
  <script src="/js/details-panel.js"></script>
  <script src="/js/effect-manager.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/armory-panel.js"></script>
  <script src="/js/maneuvers-panel.js"></script>
  <script src="/js/loadout-panel.js"></script>
  <script src="/js/advancement-panel.js"></script>
  <script src="/js/glossary-overlay.js"></script>
  <script src="/js/column-resize.js"></script>
</body>
</html>
