<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Hitbox Editor</title>
<link rel="stylesheet" href="/css/map-editor.css" />
</head>
<body>

<div class="toast" id="toast"></div>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>Hitbox Editor</h1>
    <select id="mapSelect">
      <option value="">— Select a Map —</option>
      <option value="burning-deck">The Burning Deck</option>
      <option value="switch-lair">Switch's Lair</option>
      <option value="landing-field">Reestkii Landing Field</option>
      <option value="vanishing-place">The Vanishing Place</option>
      <option value="banshee">The Banshee</option>
      <option value="jungle-trek">Jungle Clearing — Ajan Kloss</option>
      <option value="blackwind-point">Blackwind Point</option>
      <option value="filtration-plant">Water Filtration Plant</option>
      <option value="gladiator-pit">Varga's Gladiator Pit</option>
      <option value="aviary">The Aviary</option>
      <option value="knife-in-the-dark">Knife in the Dark</option>
      <option value="command-center">Command Center</option>
      <option value="dungeons">The Dungeons</option>
      <option value="throne-room">Varga's Throne Room — The Escape</option>
      <option value="throne-room-court">Varga's Throne Room — Court in Session</option>
    </select>
    <div class="dirty-indicator" id="dirtyIndicator">Unsaved changes</div>
  </div>

  <div class="hitbox-list" id="hitboxList"></div>

  <div class="props-panel" id="propsPanel">
    <h3>Selected Hitbox</h3>
    <div class="prop-field prop-field-name">
      <label>Name</label>
      <input type="text" id="propName">
    </div>
    <div class="prop-row">
      <div class="prop-field"><label>X</label><input type="number" id="propX" step="1"></div>
      <div class="prop-field"><label>Y</label><input type="number" id="propY" step="1"></div>
    </div>
    <div class="prop-row">
      <div class="prop-field"><label>W</label><input type="number" id="propW" step="1"></div>
      <div class="prop-field"><label>H</label><input type="number" id="propH" step="1"></div>
    </div>
    <div class="prop-field prop-field-desc">
      <label>Description</label>
      <textarea id="propDesc" rows="3"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="btnCopyOne">Copy Element</button>
      <button class="btn btn-delete" id="btnDelete">Delete</button>
    </div>
  </div>

  <div class="grid-panel" id="gridPanel">
    <h3>Grid Overlay <button class="grid-toggle" id="gridToggle">Off</button></h3>
    <div class="prop-row">
      <div class="prop-field"><label>Cell Size</label><input type="number" id="gridSize" value="40" min="10" max="300" step="5"></div>
      <div class="prop-field"><label>Line Width</label><input type="number" id="gridLineWidth" value="1" min="1" max="5" step="0.5"></div>
    </div>
    <div class="prop-row">
      <div class="prop-field"><label>Color</label>
        <div class="grid-color-row">
          <button class="grid-toggle on grid-color-btn" id="gridColorWhite">White</button>
          <button class="grid-toggle grid-color-btn" id="gridColorBlack">Black</button>
        </div>
      </div>
      <div class="prop-field"><label>Opacity</label><input type="range" id="gridOpacity" min="10" max="100" value="40" class="grid-opacity-input"></div>
    </div>
    <div class="prop-row">
      <div class="prop-field"><label>Offset X</label><input type="number" id="gridOffX" value="0" min="-300" max="300" step="1"></div>
      <div class="prop-field"><label>Offset Y</label><input type="number" id="gridOffY" value="0" min="-300" max="300" step="1"></div>
    </div>
    <div class="grid-mode-label" id="gridModeLabel"></div>
    <div class="grid-hint">G to toggle grid. When grid is active, arrow keys move grid (10px steps). Hold Shift for 1px fine nudge.</div>
  </div>

  <div class="sidebar-footer">
    <button class="btn add btn-full" id="btnAdd">+ Add New Hitbox</button>
    <button class="btn save btn-full" id="btnSave">Save to Map File</button>
    <button class="btn primary btn-full" id="btnCopyAll">Copy All SVG</button>
  </div>
</div>

<div class="canvas-area" id="canvasArea">
  <div class="map-wrap" id="mapWrap">
    <div class="canvas-placeholder">Select a map to begin editing hitboxes.</div>
  </div>
  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomOut">-</button>
    <button class="zoom-btn" id="zoomFit">[]</button>
    <button class="zoom-btn" id="zoomIn">+</button>
  </div>
</div>

<script src="/js/map-editor.js"></script>
</body>
</html>
