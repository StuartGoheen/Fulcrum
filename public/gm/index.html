<!DOCTYPE html>
<html lang="en" class="theme-rebellion">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Bridge — Edge of the Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/output.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.85rem;
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }
    .font-display { font-family: 'Audiowide', sans-serif; }

    .cb-header {
      background: var(--color-bg-panel);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 3rem;
      flex-shrink: 0;
    }
    .cb-header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .cb-header-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.8rem;
      color: var(--color-accent-deep);
      letter-spacing: 0.06em;
    }
    .cb-header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .cb-header-btn {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .cb-header-btn:hover {
      border-color: var(--color-accent-primary);
      color: var(--color-text-primary);
    }
    .cb-header-btn.accent {
      border-color: var(--color-accent-primary);
      color: var(--color-accent-primary);
    }
    .cb-header-btn.accent:hover {
      background: var(--color-accent-primary);
      color: var(--color-btn-text, var(--color-bg-primary));
    }
    .cb-home-link {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.65rem;
      color: var(--color-accent-primary);
      text-decoration: none;
      letter-spacing: 0.08em;
    }

    #bridge-grid {
      display: grid;
      grid-template-columns: 260px 6px 1fr 6px 300px;
      height: calc(100vh - 3rem);
      width: 95%;
      max-width: 100%;
      margin: 0 auto;
    }

    .cb-col-left, .cb-col-center, .cb-col-right {
      overflow-y: auto;
      padding: 1rem;
      scrollbar-width: thin;
      scrollbar-color: var(--color-accent-primary) var(--color-bg-frame);
    }
    .cb-col-left {
      background: var(--color-bg-panel);
      border-right: 1px solid var(--color-border);
    }
    .cb-col-right {
      background: var(--color-bg-panel);
      border-left: 1px solid var(--color-border);
    }

    .cb-drag-handle {
      width: 6px;
      background: var(--color-border);
      cursor: col-resize;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cb-drag-handle:hover, .cb-drag-handle:active {
      background: var(--color-accent-primary);
    }

    .cb-col-title {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      color: var(--color-accent-deep);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding-bottom: 0.5rem;
      margin-bottom: 0.75rem;
      border-bottom: 1px solid var(--color-border);
    }

    .cb-player-card {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      padding: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .cb-player-card.connected { border-left: 3px solid #44AA66; }
    .cb-player-card.disconnected { border-left: 3px solid var(--color-text-secondary); opacity: 0.6; }
    .cb-player-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .cb-player-name {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.8rem;
      color: var(--color-text-primary);
    }
    .cb-player-detail {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
    }
    .cb-player-vitality {
      font-family: 'Audiowide', sans-serif;
      font-size: 1rem;
      color: var(--color-accent-primary);
    }
    .cb-player-status {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      margin-top: 0.3rem;
    }

    .cb-destiny-section {
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--color-border);
    }
    .gm-destiny-tokens {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin: 0.75rem 0;
    }
    .gm-destiny-token {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      perspective: 400px;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .gm-destiny-token:hover { transform: scale(1.15); }
    .gm-destiny-token .force-token-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
    }
    .gm-destiny-token.is-dark .force-token-inner { transform: rotateY(180deg); }
    .gm-destiny-token .force-token-face {
      position: absolute; inset: 0;
      border-radius: 50%; overflow: hidden;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
    }
    .gm-destiny-token .force-token-front {
      background: radial-gradient(circle at 38% 32%, #d8eeff 0%, #80bcec 18%, #2a78c0 46%, #0a3870 74%, #030e20 100%);
      box-shadow: 0 0 0 1.5px rgba(100,180,255,0.35), 0 0 10px rgba(40,120,210,0.45);
    }
    .gm-destiny-token .force-token-back {
      background: radial-gradient(circle at 50% 44%, #7a0000 0%, #3d0000 38%, #0a0000 72%, #000 100%);
      transform: rotateY(180deg);
      animation: toll-pulse 2.5s ease-in-out infinite;
    }
    @keyframes toll-pulse {
      0%, 100% { box-shadow: 0 0 0 1.5px rgba(180,0,0,0.2), 0 0 6px rgba(160,0,0,0.25); }
      50% { box-shadow: 0 0 0 2px rgba(220,0,0,0.55), 0 0 16px rgba(200,0,0,0.6); }
    }
    .gm-destiny-token.is-tapped { opacity: 0.3; filter: grayscale(0.6); }
    .gm-destiny-count {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      text-align: center;
    }
    .hope-count { color: #2a78c0; }
    .toll-count { color: #CC0000; }
    .cb-destiny-btns {
      display: flex;
      gap: 4px;
      margin-top: 0.5rem;
    }
    .cb-destiny-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.4rem;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
    }
    .cb-destiny-btn:hover {
      border-color: var(--color-accent-primary);
      color: var(--color-accent-primary);
    }

    .cb-nav-bar {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .cb-nav-btn {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 0.4rem 0.8rem;
      font-size: 0.75rem;
      font-family: 'Exo 2', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .cb-nav-btn:hover {
      border-color: var(--color-accent-secondary);
      color: var(--color-text-primary);
    }
    .cb-nav-btn.active {
      border-color: var(--color-accent-primary);
      color: var(--color-accent-primary);
      background: rgba(204,0,0,0.06);
    }
    .cb-nav-num {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      color: var(--color-accent-primary);
    }
    .cb-part-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
    }
    .cb-part-btn.active {
      color: var(--color-accent-secondary);
      border-bottom-color: var(--color-accent-secondary);
      background: transparent;
    }

    .cb-scene-counter {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 0.75rem;
    }

    .cb-scene-header h2 {
      font-family: 'Audiowide', sans-serif;
      font-size: 1.1rem;
      color: var(--color-accent-primary);
      margin: 0 0 0.25rem;
    }
    .cb-scene-subtitle {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-bottom: 0.75rem;
    }

    .cb-read-aloud {
      background: linear-gradient(135deg, rgba(200,180,100,0.08) 0%, rgba(180,140,60,0.05) 100%);
      border-left: 3px solid var(--color-accent-secondary);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    .cb-read-aloud-text {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--color-accent-secondary);
      font-style: italic;
      white-space: pre-line;
    }

    .cb-gm-notes {
      background: var(--color-bg-frame);
      border-left: 3px solid var(--color-accent-deep);
      padding: 0.65rem 0.85rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-line;
    }

    .cb-section-label {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
      color: var(--color-accent-deep);
    }

    .cb-card {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .cb-npc-grid {
      font-size: 0.8rem;
    }
    .cb-npc-row {
      display: grid;
      grid-template-columns: 180px 140px 50px 1fr;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--color-border);
      align-items: center;
    }
    .cb-npc-row:last-child { border-bottom: none; }
    .cb-npc-header {
      font-weight: 600;
      color: var(--color-accent-secondary);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .cb-npc-name { font-weight: 600; }

    .cb-decision {
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border);
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
    }
    .cb-decision-choice {
      font-weight: 600;
      color: var(--color-accent-secondary);
      font-size: 0.85rem;
      margin-bottom: 0.2rem;
    }
    .cb-decision-consequence {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .cb-lore-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .cb-lore-tag {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0.3rem 0.6rem;
      border: 1px solid #5588CC;
      color: #5588CC;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .cb-lore-tag:hover { background: rgba(85,136,204,0.15); }

    .cb-narrative-link {
      display: block;
      font-size: 0.8rem;
      color: var(--color-accent-secondary);
      margin-bottom: 0.3rem;
      cursor: pointer;
      text-decoration: none;
    }
    .cb-narrative-link:hover { color: var(--color-text-primary); }

    .cb-scene-footer {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cb-complete-btn {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-family: 'Exo 2', sans-serif;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.15s;
      min-height: 44px;
    }
    .cb-complete-btn:hover { border-color: #44AA66; color: #44AA66; }
    .cb-complete-btn.completed { border-color: #44AA66; color: #44AA66; background: rgba(68,170,102,0.08); }

    .cb-scene-nav-arrows {
      display: flex;
      gap: 0.5rem;
    }
    .cb-arrow-btn {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-family: 'Exo 2', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      min-height: 44px;
    }
    .cb-arrow-btn:hover:not([disabled]) { border-color: var(--color-accent-primary); color: var(--color-accent-primary); }
    .cb-arrow-btn[disabled] { opacity: 0.3; cursor: default; }

    .cb-empty-scene {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--color-text-secondary);
    }
    .cb-empty-scene h3 {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin: 0 0 0.5rem;
    }

    .cb-condition-link {
      color: var(--color-accent-primary);
      cursor: pointer;
      border-bottom: 1px dotted var(--color-accent-primary);
    }
    .cb-condition-link:hover {
      color: var(--color-text-primary);
    }

    .cb-glossary-placeholder {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--color-text-secondary);
      font-style: italic;
      font-size: 0.85rem;
    }
    .cb-glossary-header {
      font-family: 'Audiowide', sans-serif;
      font-size: 1rem;
      color: var(--color-accent-primary);
      margin-bottom: 0.3rem;
    }
    .cb-glossary-type {
      font-size: 0.75rem;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }
    .cb-glossary-rule {
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 0.75rem;
      white-space: pre-line;
    }
    .cb-glossary-guide {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      font-style: italic;
      line-height: 1.5;
      margin-top: 0.5rem;
    }
    .cb-glossary-dual {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .cb-glossary-dual-side {
      background: var(--color-bg-frame);
      padding: 0.5rem 0.6rem;
      font-size: 0.8rem;
    }
    .cb-glossary-dual-label {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.2rem;
      opacity: 0.8;
    }

    .cb-muted {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
    }

    .lore-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .lore-modal-overlay.active { display: flex; }
    .lore-modal {
      background: var(--color-bg-panel);
      border: 1px solid var(--color-border);
      padding: 1.5rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .lore-modal h3 {
      font-family: 'Audiowide', sans-serif;
      font-size: 0.9rem;
      color: #5588CC;
      margin: 0 0 1rem;
    }
    .lore-modal .close-btn {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-size: 0.8rem;
      float: right;
      min-height: 44px;
    }
    .cb-lore-scene-link {
      background: var(--color-bg-frame);
      border: 1px solid var(--color-border);
      padding: 0.6rem 0.85rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.85rem;
    }
    .cb-lore-scene-link:hover { border-color: var(--color-accent-secondary); }

    scrollbar-width: thin;
    scrollbar-color: var(--color-accent-primary) var(--color-bg-frame);
  </style>
</head>
<body>
  <header class="cb-header">
    <div class="cb-header-left">
      <a href="/" class="cb-home-link">&larr; HOME</a>
      <span class="cb-header-title">COMMAND BRIDGE</span>
    </div>
    <div class="cb-header-right">
      <span style="font-size:0.7rem;color:var(--color-text-secondary);margin-right:0.25rem;">Ship Combat: <span id="sc-status" style="color:var(--color-text-secondary);">Inactive</span></span>
      <button class="cb-header-btn accent" id="cb-launch-starship">Launch Starship Combat</button>
      <button class="cb-header-btn accent" id="cb-end-starship" style="display:none;">End Ship Combat</button>
      <button class="cb-header-btn" id="cb-theme-toggle">Theme</button>
      <button class="cb-header-btn" id="cb-logout">Logout</button>
    </div>
  </header>

  <div id="bridge-grid">
    <div class="cb-col-left">
      <div class="cb-col-title">Crew Monitor</div>
      <div id="party-list">
        <p class="cb-muted" style="font-style:italic;">Loading crew data&hellip;</p>
      </div>

      <div class="cb-destiny-section" id="sc-seats-section" style="display:none;">
        <div class="cb-col-title">Crew Stations</div>
        <div id="sc-seats"><div class="cb-muted">No stations claimed.</div></div>
      </div>

      <div class="cb-destiny-section">
        <div class="cb-col-title">Crew Destiny</div>
        <div class="gm-destiny-tokens" id="gm-destiny-tokens">
          <span class="cb-muted" style="font-style:italic;">No crew connected</span>
        </div>
        <div class="gm-destiny-count" id="gm-destiny-count"></div>
        <div class="cb-destiny-btns">
          <button class="cb-destiny-btn" id="gm-destiny-untap">Untap All</button>
          <button class="cb-destiny-btn" id="gm-destiny-reset">Reset Pool</button>
        </div>
      </div>
    </div>

    <div class="cb-drag-handle" id="drag-left" title="Drag to resize"></div>

    <div class="cb-col-center">
      <div class="cb-nav-bar" id="adv-nav"></div>
      <div class="cb-nav-bar" id="part-nav"></div>
      <div class="cb-scene-counter" id="scene-counter"></div>
      <div id="scene-carousel">
        <div class="cb-empty-scene"><p>Loading campaign data&hellip;</p></div>
      </div>
    </div>

    <div class="cb-drag-handle" id="drag-right" title="Drag to resize"></div>

    <div class="cb-col-right">
      <div class="cb-col-title">Glossary</div>
      <div id="glossary-content">
        <div class="cb-glossary-placeholder">
          Click a <span style="color:var(--color-accent-primary);">[Condition]</span> in any scene text to view its details here.
        </div>
      </div>
    </div>
  </div>

  <div class="lore-modal-overlay" id="lore-modal-overlay">
    <div class="lore-modal" id="lore-modal">
      <button class="close-btn" id="lore-modal-close">&times; Close</button>
      <h3 id="lore-modal-title"></h3>
      <div id="lore-modal-body"></div>
    </div>
  </div>

  <script src="/js/command-bridge.js"></script>
</body>
</html>
