<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Black Ledger — Edge of the Empire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/output.css" />
  <link rel="stylesheet" href="/css/command-bridge.css" />
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="forge-sparks">
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
    <div class="forge-spark"></div>
  </div>

  <header class="cb-header">
    <div class="cb-header-left">
      <a href="/" class="cb-home-link">&larr; HOME</a>
      <img src="/images/fulcrum-logo.png" alt="Fulcrum" class="cb-header-logo" />
      <span class="cb-header-brand">The Black Ledger</span>
    </div>
    <div class="cb-header-nav" id="cb-header-nav">
      <span class="cb-header-adv-title" id="cb-header-adv" title="Click to change adventure"></span>
      <span class="cb-header-sep">&mdash;</span>
      <span class="cb-header-part-title" id="cb-header-part" title="Click to change part"></span>
    </div>
    <div class="cb-header-right">
      <button class="cb-header-btn" id="cb-logout">Logout</button>
    </div>
  </header>

  <div class="cb-picker-overlay" id="cb-picker-overlay">
    <div class="cb-picker-modal" id="cb-picker-modal">
      <div class="cb-picker-header">
        <span class="cb-picker-title" id="cb-picker-title"></span>
        <button class="cb-picker-close" id="cb-picker-close">&times;</button>
      </div>
      <div class="cb-picker-list" id="cb-picker-list"></div>
    </div>
  </div>

  <button class="cb-panel-tab cb-panel-tab--left" id="cb-tab-left" title="Show Crew Panel">Crew</button>
  <button class="cb-panel-tab cb-panel-tab--right" id="cb-tab-right" title="Show Glossary Panel">Glossary</button>

  <div id="bridge-grid">
    <div class="cb-col-left" id="cb-col-left">
      <div class="cb-col-title" style="display:flex;align-items:center;justify-content:space-between;">Crew Monitor <button class="cb-collapse-btn" id="cb-collapse-left" title="Collapse panel">&laquo;</button></div>
      <div id="party-list">
        <p class="cb-muted" style="font-style:italic;">Loading crew data&hellip;</p>
      </div>

      <div class="cb-destiny-section">
        <div class="cb-col-title">Crew Destiny</div>
        <div class="gm-destiny-tokens" id="gm-destiny-tokens">
          <span class="cb-muted" style="font-style:italic;">No crew connected</span>
        </div>
        <div class="gm-destiny-count" id="gm-destiny-count"></div>
        <div class="cb-destiny-btns">
          <button class="cb-destiny-btn cb-destiny-lock-btn" id="gm-destiny-lock">Lock Pool</button>
          <button class="cb-destiny-btn" id="gm-destiny-untap">Untap All</button>
          <button class="cb-destiny-btn" id="gm-destiny-reset">Reset Pool</button>
        </div>
      </div>

      <div class="cb-destiny-section">
        <div class="cb-col-title">Item Requests <span id="req-badge" class="cb-req-badge" style="display:none;"></span></div>
        <div id="item-requests-list">
          <p class="cb-muted" style="font-style:italic;">Loading&hellip;</p>
        </div>
      </div>
    </div>

    <div class="cb-drag-handle" id="drag-left" title="Drag to resize"></div>

    <div class="cb-col-center">
      <div class="cb-nav-bar" id="part-nav"></div>
      <div class="cb-scene-counter" id="scene-counter"></div>
      <div id="combat-tracker-panel"></div>
      <div id="scene-carousel">
        <div class="cb-empty-scene"><p>Loading campaign data&hellip;</p></div>
      </div>
    </div>

    <div class="cb-drag-handle" id="drag-right" title="Drag to resize"></div>

    <div class="cb-col-right" id="cb-col-right">
      <button class="cb-header-btn accent" id="cb-build-threat" style="width:100%;margin-bottom:0.75rem;justify-content:center;">Build Threat</button>
      <div class="cb-col-title" style="display:flex;align-items:center;justify-content:space-between;">Glossary <button class="cb-collapse-btn" id="cb-collapse-right" title="Collapse panel">&raquo;</button></div>
      <div id="glossary-content">
        <div class="cb-glossary-placeholder">
          Click a <span style="color:#c8a44e;">[Condition]</span> in any scene text to view its details here.
        </div>
      </div>
      <div class="cb-col-title" style="margin-top:1rem;">Crew Journal</div>
      <div id="cb-crew-journal" class="cb-crew-journal"></div>
      <div class="cb-col-title" style="margin-top:1rem;display:flex;align-items:center;justify-content:space-between;">Decision Log <button class="cb-header-btn" id="cb-log-decision-btn" style="font-size:0.55rem;padding:0.25rem 0.5rem;min-height:auto;">+ Log</button></div>
      <div id="cb-decision-timeline"></div>

      <div class="cb-col-title" style="margin-top:1rem;display:flex;align-items:center;justify-content:space-between;">Narrative Challenges <button class="cb-header-btn" id="cb-launch-challenge-btn" style="font-size:0.55rem;padding:0.25rem 0.5rem;min-height:auto;">+ New</button></div>
      <div id="cb-challenge-status"></div>
    </div>
  </div>


  <div class="npc-builder-overlay" id="npc-builder-overlay">
    <div class="npc-builder-modal">
      <div class="npc-builder-header">
        <span class="npc-builder-title">NPC THREAT BUILDER</span>
        <button class="npc-builder-close-btn" id="npc-builder-close">&times;</button>
      </div>
      <div class="npc-builder-body">
        <div class="npc-builder-panel npc-builder-panel-left" id="npc-builder-left"></div>
        <div class="npc-resize-handle" id="npc-resize-left" data-target="left"></div>
        <div class="npc-builder-panel npc-builder-panel-center" id="npc-card-preview"></div>
        <div class="npc-resize-handle" id="npc-resize-right" data-target="right"></div>
        <div class="npc-builder-panel npc-builder-panel-right" id="npc-builder-right"></div>
      </div>
    </div>
  </div>

  <div class="npc-loot-assign-overlay" id="npc-loot-assign-overlay">
    <div class="npc-loot-assign-modal" id="npc-loot-assign-body"></div>
  </div>


  <div class="npc-toast" id="npc-toast"></div>

  <script src="/js/tts-narration.js"></script>
  <script src="/js/effect-manager.js"></script>
  <script src="/js/combat-tracker.js"></script>
  <script src="/js/command-bridge.js"></script>
  <script src="/js/npc-builder.js"></script>
</body>
</html>
